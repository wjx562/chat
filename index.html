<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的 AI 搭档（环境感知版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 顶部功能按钮 */
        .btn-group {
            padding: 10px;
            background-color: #fff;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .func-btn {
            padding: 8px 15px;
            background-color: #007aff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .func-btn.stop {
            background-color: #ff3b30;
        }
        .func-btn:active {
            opacity: 0.8;
        }
        /* 摄像头容器（完全隐藏，后台持续运行） */
        #camera-container {
            display: none;
            position: fixed;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }
        /* 聊天区域 */
        #chat-container {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }
        .message {
            margin: 10px 0;
            max-width: 80%;
        }
        .user-msg {
            margin-left: auto;
            background-color: #007aff;
            color: #fff;
            padding: 10px;
            border-radius: 10px 10px 0 10px;
        }
        .ai-msg {
            margin-right: auto;
            background-color: #fff;
            padding: 10px;
            border-radius: 10px 10px 10px 0;
            border: 1px solid #eee;
        }
        /* 输入区域 */
        .input-group {
            padding: 10px;
            background-color: #fff;
            display: flex;
            gap: 10px;
        }
        #msg-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }
        #send-btn {
            padding: 10px 20px;
            background-color: #007aff;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        #send-btn:active {
            background-color: #0066cc;
        }
    </style>
</head>
<body>
    <!-- 功能按钮区 -->
    <div class="btn-group">
        <button class="func-btn" onclick="startEnvironmentSense()">启动环境感知</button>
        <button class="func-btn stop" onclick="stopEnvironmentSense()">关闭环境感知</button>
    </div>

    <!-- 摄像头容器（完全隐藏） -->
    <div id="camera-container">
        <video id="camera-preview" autoplay playsinline muted></video>
    </div>

    <!-- 聊天区域 -->
    <div id="chat-container"></div>

    <!-- 输入区域 -->
    <div class="input-group">
        <input type="text" id="msg-input" placeholder="和AI聊天吧（它能看到你的周围环境）...">
        <button id="send-btn" onclick="sendMsgWithEnv()">发送</button>
    </div>

    <script>
        // ========== 核心配置（你的密钥和模型） ==========
        const DOUBAO_API_KEY = "34ecff81-0e0c-4c1d-8182-cb1d6889e2ee";
        const DOUBAO_MODEL = "doubao-seed-2-0-pro-260215";
        const DOUBAO_API_URL = "https://ark.cn-beijing.volces.com/api/v3/chat/completions";
        
        // 全局变量
        let stream = null; // 摄像头流（持续运行）
        let isSenseRunning = false; // 环境感知是否开启

        // 1. 启动环境感知（摄像头后台持续运行）
        async function startEnvironmentSense() {
            if (isSenseRunning) {
                addChatMsg("系统", "环境感知已经开启啦～", "ai");
                return;
            }

            try {
                addChatMsg("系统", "正在启动环境感知（AI开始看到你的周围）...", "ai");
                
                // 打开摄像头（后置，后台运行）
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment', // 优先后置摄像头
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });

                // 绑定到视频元素（后台运行，无显示）
                const preview = document.getElementById('camera-preview');
                preview.srcObject = stream;
                
                // 标记为运行中
                isSenseRunning = true;
                addChatMsg("系统", "环境感知已开启！现在和AI聊天，它会结合你的周围环境回答～", "ai");

            } catch (error) {
                addChatMsg("系统", "环境感知启动失败：" + error.message, "ai");
                console.error("摄像头启动错误：", error);
            }
        }

        // 2. 关闭环境感知（停止摄像头）
        function stopEnvironmentSense() {
            if (!isSenseRunning) {
                addChatMsg("系统", "环境感知还没开启哦～", "ai");
                return;
            }

            // 停止摄像头流
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            
            isSenseRunning = false;
            addChatMsg("系统", "环境感知已关闭，AI不再看到你的周围环境～", "ai");
        }

        // 3. 发送消息（自动结合环境画面）
        async function sendMsgWithEnv() {
            const input = document.getElementById('msg-input');
            const userMsg = input.value.trim();
            if (!userMsg) return;

            // 清空输入框
            input.value = "";
            // 显示用户消息
            addChatMsg("我", userMsg, "user");
            addChatMsg("AI", "正在结合你的环境思考...", "ai");

            try {
                let aiReply = "";
                // 如果环境感知已开启：捕获当前画面 + 结合问题发给AI
                if (isSenseRunning && stream) {
                    // 捕获当前摄像头画面
                    const preview = document.getElementById('camera-preview');
                    const canvas = document.createElement('canvas');
                    canvas.width = preview.videoWidth;
                    canvas.height = preview.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(preview, 0, 0, canvas.width, canvas.height);
                    const imageBase64 = canvas.toDataURL('image/jpeg', 0.8);

                    // 调用AI（文字+图片）
                    aiReply = await sendMsgWithImage(userMsg, imageBase64);
                } else {
                    // 环境感知未开启：只发文字消息
                    aiReply = await sendMsgOnlyText(userMsg);
                    addChatMsg("系统", "提示：环境感知未开启，AI仅根据文字回答～", "ai");
                }

                // 更新AI回复
                updateLastMsg(aiReply);

            } catch (error) {
                updateLastMsg("回答失败：" + error.message);
                console.error("AI调用错误：", error);
            }
        }

        // 4. 调用AI（文字+环境图片）
        async function sendMsgWithImage(text, imageBase64) {
            const response = await fetch(DOUBAO_API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + DOUBAO_API_KEY
                },
                body: JSON.stringify({
                    model: DOUBAO_MODEL,
                    messages: [
                        {
                            role: "user",
                            content: [
                                { type: "text", text: `结合你看到的环境（图片），回答我的问题：${text}` },
                                { type: "image_url", image_url: { url: imageBase64 } }
                            ]
                        }
                    ],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            return data.choices[0].message.content;
        }

        // 5. 调用AI（仅文字）
        async function sendMsgOnlyText(text) {
            const response = await fetch(DOUBAO_API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + DOUBAO_API_KEY
                },
                body: JSON.stringify({
                    model: DOUBAO_MODEL,
                    messages: [{ role: "user", content: text }],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            return data.choices[0].message.content;
        }

        // 6. 添加聊天消息
        function addChatMsg(sender, content, type) {
            const chatContainer = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}-msg`;
            msgDiv.innerHTML = `<div class="msg-content">${content}</div>`;
            chatContainer.appendChild(msgDiv);
            // 滚动到底部
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 7. 更新最后一条AI消息
        function updateLastMsg(content) {
            const chatContainer = document.getElementById('chat-container');
            const lastMsg = chatContainer.lastChild;
            if (lastMsg && lastMsg.classList.contains('ai-msg')) {
                lastMsg.innerHTML = `<div class="msg-content">${content}</div>`;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        // 监听回车发送
        document.getElementById('msg-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMsgWithEnv();
        });

        // 初始化提示
        addChatMsg("AI", "你好！点击「启动环境感知」，我就能看到你的周围环境，和我聊天时我会结合环境回答～", "ai");
    </script>
</body>
</html>
