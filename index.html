<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的 AI 搭档</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 顶部功能按钮 */
        .btn-group {
            padding: 10px;
            background-color: #fff;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .func-btn {
            padding: 8px 15px;
            background-color: #007aff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .func-btn:active {
            background-color: #0066cc;
        }
        /* 摄像头预览区域 */
        #camera-container {
            flex: 1;
            display: none;
            position: relative;
            background-color: #000;
        }
        #camera-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #capture-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #fff;
            border: 4px solid #ddd;
            cursor: pointer;
        }
        /* 聊天区域 */
        #chat-container {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }
        .message {
            margin: 10px 0;
            max-width: 80%;
        }
        .user-msg {
            margin-left: auto;
            background-color: #007aff;
            color: #fff;
            padding: 10px;
            border-radius: 10px 10px 0 10px;
        }
        .ai-msg {
            margin-right: auto;
            background-color: #fff;
            padding: 10px;
            border-radius: 10px 10px 10px 0;
            border: 1px solid #eee;
        }
        .msg-img {
            width: 100%;
            border-radius: 8px;
            margin-top: 5px;
        }
        /* 输入区域 */
        .input-group {
            padding: 10px;
            background-color: #fff;
            display: flex;
            gap: 10px;
        }
        #msg-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }
        #send-btn {
            padding: 10px 20px;
            background-color: #007aff;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 功能按钮区 -->
    <div class="btn-group">
        <button class="func-btn" onclick="openCamera()">环境视觉</button>
        <button class="func-btn" onclick="startScreenCapture()">屏幕识别</button>
        <button class="func-btn" onclick="closeCamera()">关闭摄像头</button>
    </div>

    <!-- 摄像头预览区 -->
    <div id="camera-container">
        <video id="camera-preview" autoplay playsinline></video>
        <button id="capture-btn" onclick="captureAndAnalyze()"></button>
    </div>

    <!-- 聊天区域 -->
    <div id="chat-container"></div>

    <!-- 输入区域 -->
    <div class="input-group">
        <input type="text" id="msg-input" placeholder="输入消息...">
        <button id="send-btn" onclick="sendTextMsg()">发送</button>
    </div>

    <script>
        // ========== 核心配置（已替换为你的密钥和模型） ==========
        const DOUBAO_API_KEY = "34ecff81-0e0c-4c1d-8182-cb1d6889e2ee"; // 你的API密钥
        const DOUBAO_MODEL = "doubao-seed-2-0-pro-260215"; // 你的专属模型
        const DOUBAO_API_URL = "https://www.doubao.com/api/v1/chat/completions";
        
        // 全局变量
        let stream = null; // 摄像头流
        let screenStream = null; // 屏幕流

        // 1. 打开摄像头
        async function openCamera() {
            try {
                // 显示摄像头预览区，隐藏聊天区
                document.getElementById('camera-container').style.display = 'block';
                document.getElementById('chat-container').style.display = 'none';

                // 请求摄像头权限
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment', // 优先使用后置摄像头
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                });

                // 显示摄像头画面
                const preview = document.getElementById('camera-preview');
                preview.srcObject = stream;
                addChatMsg("系统", "摄像头已打开，点击底部按钮分析画面", "ai");
            } catch (error) {
                addChatMsg("系统", "摄像头打开失败：" + error.message, "ai");
                console.error("摄像头错误：", error);
            }
        }

        // 2. 关闭摄像头
        function closeCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            document.getElementById('camera-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'block';
            addChatMsg("系统", "摄像头已关闭", "ai");
        }

        // 3. 捕获摄像头画面并发送给AI分析
        async function captureAndAnalyze() {
            try {
                const preview = document.getElementById('camera-preview');
                const canvas = document.createElement('canvas');
                
                // 设置画布尺寸为摄像头画面尺寸
                canvas.width = preview.videoWidth;
                canvas.height = preview.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(preview, 0, 0, canvas.width, canvas.height);

                // 转换为Base64（压缩图片，减少传输大小）
                const imageBase64 = canvas.toDataURL('image/jpeg', 0.8);
                
                // 显示捕获的图片
                addChatMsg("我", "", "user", imageBase64);
                addChatMsg("AI", "正在分析画面...", "ai");

                // 调用AI分析图片
                const aiReply = await sendImageToDoubao(imageBase64, "分析这张图片，描述画面内容，尽可能详细");
                addChatMsg("AI", aiReply, "ai");

            } catch (error) {
                addChatMsg("系统", "图片捕获失败：" + error.message, "ai");
                console.error("捕获错误：", error);
            }
        }

        // 4. 屏幕识别（录制屏幕并发送给AI）
        async function startScreenCapture() {
            try {
                // 请求屏幕录制权限
                screenStream = await navigator.mediaDevices.getDisplayMedia({
                    video: true,
                    audio: false
                });

                // 显示屏幕录制提示
                addChatMsg("系统", "已开始屏幕录制，正在捕获当前屏幕...", "ai");
                
                // 捕获第一帧屏幕画面
                const video = document.createElement('video');
                video.srcObject = screenStream;
                video.play();

                // 等待视频加载完成后捕获画面
                video.onloadeddata = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0);
                    
                    const imageBase64 = canvas.toDataURL('image/jpeg', 0.8);
                    addChatMsg("我", "屏幕识别", "user", imageBase64);
                    addChatMsg("AI", "正在分析屏幕内容...", "ai");

                    // 调用AI分析屏幕
                    const aiReply = await sendImageToDoubao(imageBase64, "分析这张屏幕截图，描述显示的内容");
                    addChatMsg("AI", aiReply, "ai");

                    // 停止屏幕录制
                    screenStream.getTracks().forEach(track => track.stop());
                    screenStream = null;
                };

            } catch (error) {
                addChatMsg("系统", "屏幕录制失败：" + error.message, "ai");
                console.error("屏幕录制错误：", error);
            }
        }

        // 5. 发送文字消息给AI
        async function sendTextMsg() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            // 清空输入框
            input.value = "";
            // 显示用户消息
            addChatMsg("我", text, "user");
            // 显示加载提示
            addChatMsg("AI", "正在思考...", "ai");

            // 调用AI获取回复
            const aiReply = await sendTextToDoubao(text);
            // 更新AI回复
            updateLastMsg(aiReply);
        }

        // 6. 调用豆包API - 发送图片
        async function sendImageToDoubao(imageBase64, prompt) {
            try {
                const response = await fetch(DOUBAO_API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + DOUBAO_API_KEY
                    },
                    body: JSON.stringify({
                        model: DOUBAO_MODEL, // 使用你的专属模型
                        messages: [
                            {
                                role: "user",
                                content: [
                                    { type: "text", text: prompt },
                                    { type: "image_url", image_url: { url: imageBase64 } }
                                ]
                            }
                        ],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                return data.choices[0].message.content;

            } catch (error) {
                console.error("AI请求错误：", error);
                return "分析失败：" + error.message;
            }
        }

        // 7. 调用豆包API - 发送文字
        async function sendTextToDoubao(text) {
            try {
                const response = await fetch(DOUBAO_API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + DOUBAO_API_KEY
                    },
                    body: JSON.stringify({
                        model: DOUBAO_MODEL, // 使用你的专属模型
                        messages: [
                            { role: "user", content: text }
                        ],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                return data.choices[0].message.content;

            } catch (error) {
                console.error("AI请求错误：", error);
                return "回复失败：" + error.message;
            }
        }

        // 8. 添加聊天消息到界面
        function addChatMsg(sender, content, type, imageBase64 = "") {
            const chatContainer = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}-msg`;
            msgDiv.id = "msg-" + Date.now(); // 唯一ID

            let html = `<div class="msg-content">${content || ""}</div>`;
            if (imageBase64) {
                html += `<img src="${imageBase64}" class="msg-img">`;
            }

            msgDiv.innerHTML = html;
            chatContainer.appendChild(msgDiv);
            // 滚动到底部
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 9. 更新最后一条消息（AI回复）
        function updateLastMsg(content) {
            const chatContainer = document.getElementById('chat-container');
            const lastMsg = chatContainer.lastChild;
            if (lastMsg && lastMsg.classList.contains('ai-msg')) {
                lastMsg.innerHTML = `<div class="msg-content">${content}</div>`;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        // 监听回车发送
        document.getElementById('msg-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendTextMsg();
            }
        });

        // 初始化
        addChatMsg("AI", "你好！我是你的AI搭档，支持环境视觉和屏幕识别功能～", "ai");
    </script>
</body>
</html>
